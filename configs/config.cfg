[ENV]
min_Ej = 0.05                  # Minimum Josephson energy.
max_Ej = 12.0                  # Maximum Josephson energy.
min_Ec = 0.15                  # Minimum Charging energy.
max_Ec = 0.3                   # Maximum Charging energy.
min_Ng = -1.0                  # Minimum offset charge.
max_Ng = 1.0                   # Maximum offset charge.

[NEURAL_NET]
layer_act_dims = [300, 300]    # Number of neurons in each hidden layer of the Actor network.
layer_crit_dims = [300, 300]   # Number of neurons in each hidden layer of the Critic network.

[AGENT]
lr_actor = 1e-4       # Learning rate for the actor network (policy). Controls how fast it updates actions.
lr_critic = 3e-4      # Learning rate for the critic network (value function). Affects stability of value estimates.
rho = 0.005           # Soft update rate for target networks. Smaller values mean slower, more stable updates.
gamma = 0.98          # Discount factor. Determines the importance of future rewards (closer to 1 = long-term focus).
noise = 0.2           # Scale of exploration noise added to actions (e.g., Gaussian noise).
buffer_size = 100000  # Maximum number of transitions the replay buffer can store.
batch_size = 128      # Number of time-step transitions sampled from the replay buffer for each gradient update.

[TRAIN]
seed = 32             # Global seed used for Python, NumPy, TensorFlow, and environment resets.
num_episodes = 100    # Number of episodes to train the agent.
max_steps = 55        # Number of time-step transitions to collect per episode (rollout) before each policy update.
